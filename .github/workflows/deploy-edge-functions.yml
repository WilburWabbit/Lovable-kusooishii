name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v5

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Configure it in GitHub → Settings → Secrets and variables → Actions. Generate a token at https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID secret is not set. Configure it in GitHub → Settings → Secrets and variables → Actions. The value is your Supabase project reference ID."
            exit 1
          fi
          echo "All required secrets are configured."

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Show CLI version
        run: supabase --version

      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
