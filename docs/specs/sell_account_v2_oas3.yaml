  /user_preferences:
    get:
      tags:
      - "user_preferences"
      description: "This method retrieves the seller's preferences for a specific\
        \ eBay marketplace, such as combined payment preferences, same-day shipping\
        \ cutoff time, excluded shipping locations, and opt-in status for Business\
        \ Policies and Out-of-Stock control. The <b>fieldgroups</b> query parameter\
        \ specifies the type of seller preferences to retrieve. If <b>fieldgroups</b>\
        \ = <code>ALL</code> or the parameter is omitted, all the supported seller\
        \ preferences are returned. To retrieve only specific preferences, include\
        \ the <b>fieldgroups</b> parameter with one or more supported values, delimited\
        \ by commas."
      operationId: "getUserPreferences"
      parameters:
      - name: "fieldgroups"
        in: "query"
        description: "The <b>fieldgroups</b> query parameter specifies the type of\
          \ seller preferences to retrieve. <br><br>If <b>fieldgroups</b>=<code>ALL</code>\
          \ or is omitted, all the supported seller preferences are returned. <br><br>To\
          \ retrieve specific seller preferences, include the <b>fieldgroups</b> parameter\
          \ and specify one or more values, with each value delimited by a comma.\
          \ <br><br>For example, <code>fieldgroups = SHIPPING_CARRIER_RATE,COMBINED_PAYMENT</code>.\
          \ <br><br>The value can be <code>ALL</code> or any combination of the following\
          \ (comma-separated):<br><code>COMBINED_PAYMENT</code>, <code>DISPATCH_CUTOFF_TIME</code>,\
          \ <code>EMAIL_SHIPMENT_TRACKING_NUMBER</code>, <code>END_OF_AUCTION_EMAIL</code>,\
          \ <code>GLOBAL_SHIPPING_PROGRAM</code>, <code>GLOBAL_SHIPPING_PROGRAM_LISTING</code>,\
          \ <code>ITEMS_AWAITING_PAYMENT</code>, <code>OUT_OF_STOCK_CONTROL SELLER_PROFILE</code>,\
          \ <code>OVERRIDE_GSP_SERVICE_WITH_INTL_SERVICE</code>, <code>PICKUP_DROPOFF_SELLER</code>,\
          \ <code>PURCHASE_REMINDER_EMAIL</code>, <code>REQUIRED_SHIP_PHONE_NUMBER</code>,\
          \ <code>SELLER_EXCLUDE_SHIP_TO_LOCATION</code>, <code>SHIPPING_CARRIER_RATE</code>"
        required: false
        schema:
          type: "string"
      - name: "X-EBAY-C-MARKETPLACE-ID"
        in: "header"
        description: "This required header sets the eBay marketplace from which the\
          \ seller's preferences are retrieved. See the <code>MarketplaceIdEnum</code>\
          \ type for the full list of values."
        required: true
        schema:
          type: "string"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserPreferencesResponse"
        "400":
          description: "Bad Request"
          x-response-codes:
            errors:
              396502:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified field groups are invalid. Error Details\
                  \ - {errorDetails}"
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              396500:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "Internal Server Error. Please try again later or contact\
                  \ Developer Technical Support."
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.account.readonly"
