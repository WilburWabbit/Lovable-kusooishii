components:
  schemas:
    Amount:
      type: "object"
      properties:
        currency:
          type: "string"
          description: "The base currency applied to the <b>value</b> field to establish\
            \ a monetary amount.<br/><br/>The currency is represented as a 3-letter\
            \ ISO 4217 currency code. For example, the code for the Canadian Dollar\
            \ is <code>CAD</code>. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/ba:CurrencyCodeEnum'>eBay\
            \ API documentation</a>"
        value:
          type: "string"
          description: "The monetary amount in the specified <b>currency</b>."
      description: "A complex type that describes the value of a monetary amount as\
        \ represented by a global currency."
    CalculatedHandlingRuleType:
      type: "object"
      properties:
        combinedShippingRuleType:
          type: "string"
          description: "This enumeration type specifies the type of combined-shipping\
            \ rule applied to handling fees <br><br>(for example, weight-based, flat-rate,\
            \ or percentage-based calculation method). For implementation help, refer\
            \ to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedShippingRuleTypeHandlingEnum'>eBay\
            \ API documentation</a>"
        eachAdditionalAmount:
          description: "This container specifies the additional monetary charge applied\
            \ for each extra item included in a combined shipment."
          $ref: "#/components/schemas/Amount"
        eachAdditionalAmountOffShippingCost:
          description: "This container represents the fixed monetary discount deducted\
            \ from the total shipping cost for each additional item in a combined\
            \ shipment."
          $ref: "#/components/schemas/Amount"
        eachAdditionalPercentOffShippingCost:
          type: "number"
          description: "This integer specifies the percentage discount applied to\
            \ the total shipping cost for each additional item in a combined shipment."
        orderHandlingAmount:
          description: "This container represents the handling fee charged for processing\
            \ a combined order, if applicable."
          $ref: "#/components/schemas/Amount"
      description: "This type defines the structure for calculated handling fee discounts\
        \ applicable when combining multiple orders."
    CalculatedShippingRuleType:
      type: "object"
      properties:
        combinedShippingRules:
          type: "array"
          description: "This array lists the discount rules applied to combined shipments,\
            \ detailing calculation methods and rule identifiers. <br><br>When used\
            \ by a create call, there won't be any rule ID."
          items:
            $ref: "#/components/schemas/CombinedShippingRule"
        combinedShippingRuleType:
          type: "string"
          description: "This container defines the type of combined-shipping rule\
            \ applied to calculate discounts, such as weight-based, percentage-based,\
            \ or flat-rate models. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedShippingRuleTypeEnum'>eBay\
            \ API documentation</a>"
      description: "This type describes calculated discount rules determining total\
        \ shipping cost reductions for combined items."
    CombinedPaymentPreferencesType:
      type: "object"
      properties:
        combinedPaymentOption:
          type: "string"
          description: "This enum type defines the available options for handling\
            \ combined payments when a seller allows multiple line items from the\
            \ same buyer to be paid for with a single payment. See <code>CombinedPaymentOptionEnum</code>\
            \ for a description of each value. For implementation help, refer to <a\
            \ href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentOptionEnum'>eBay\
            \ API documentation</a>"
      description: "This container is used to change the combined payment option.\
        \ Sellers have the option to combine multiple line items from the same buyer\
        \ into a combined invoice that can be paid for with one payment. See CombinedPaymentOptionEnum\
        \ for a description of each value."
    CombinedShippingRule:
      type: "object"
      properties:
        combinedShippingRuleId:
          type: "string"
          description: "This field represents the unique identifier for the combined-shipping\
            \ discount profile, <br><br>used to reference or update a specific rule\
            \ configuration."
        combinedShippingRuleName:
          type: "string"
          description: "This field specifies the unique name identifying the combined\
            \ shipping discount profile within the seller’s account. This name is\
            \ configured by the seller and can have a maximum of XX characters."
        eachAdditionalAmount:
          description: "This containter defines the additional monetary charge applied\
            \ for each extra item when multiple items are shipped together."
          $ref: "#/components/schemas/Amount"
        eachAdditionalAmountOffShippingCost:
          description: "This container defines the fixed discount amount deducted\
            \ from the total shipping cost for each additional item."
          $ref: "#/components/schemas/Amount"
        eachAdditionalPercentOffShippingCost:
          type: "number"
          description: "This integer specifies the percentage discount applied to\
            \ the total shipping cost for each additional item in the combined order."
        mappedCombinedShippingRuleId:
          type: "string"
          description: "This field specifies the unique ID that links this combined-shipping\
            \ rule to another related rule in the seller’s account."
        weightOffTotalWeight:
          description: "This container specifies the total weight reduction applied\
            \ when combining multiple items into one shipment."
          $ref: "#/components/schemas/MeasureType"
      description: "This container defines a discount profile schema for combined\
        \ shipping, including rule IDs, names, and applicable weight or amount reductions.<br><br><span\
        \ class=\"tablenote\"><b>Note:</b> This field is not applicable for the create\
        \ rule use case."
    CreateCalculatedShippingRulesRequest:
      type: "object"
      properties:
        calculatedHandlingRule:
          description: "This container defines the calculated handling fee rules applied\
            \ to combined orders, specifying how handling costs are determined or\
            \ discounted <br><br>based on combined-shipping parameters."
          $ref: "#/components/schemas/CalculatedHandlingRuleType"
        calculatedShippingRule:
          description: "This container defines the calculated shipping rule applied\
            \ to combined orders, detailing how shipping discounts or costs are computed\
            \ <br><br>based on item count, total weight, or order value."
          $ref: "#/components/schemas/CalculatedShippingRuleType"
        combinedDuration:
          type: "string"
          description: "This container specifies the time window during which multiple\
            \ unpaid orders can be combined into a single payment or invoice, represented\
            \ by using one of the values in CombinedPaymentPeriodEnum type. For implementation\
            \ help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentPeriodEnum'>eBay\
            \ API documentation</a>"
      description: "This type defines the structure of a request to create calculated\
        \ shipping rules, including handling, duration, and rule type details."
    CreateFlatShippingRulesRequest:
      type: "object"
      properties:
        combinedDuration:
          type: "string"
          description: "This container specifies the time window during which multiple\
            \ unpaid orders can be combined into a single payment or invoice, represented\
            \ by using one of the values in CombinedPaymentPeriodEnum type. For implementation\
            \ help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentPeriodEnum'>eBay\
            \ API documentation</a>"
        flatShippingRule:
          description: "This container defines the flat-rate combined-shipping rule,\
            \ which applies a fixed shipping cost for multiple items shipped together."
          $ref: "#/components/schemas/FlatShippingRuleType"
      description: "This type represents a request to configure flat-rate combined\
        \ shipping rules with specified durations and conditions."
    CreatePromotionalShippingRuleRequest:
      type: "object"
      properties:
        combinedDuration:
          type: "string"
          description: "This container specifies the time window during which multiple\
            \ unpaid orders can be combined into a single payment or invoice, represented\
            \ by using one of the values in CombinedPaymentPeriodEnum type. For implementation\
            \ help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentPeriodEnum'>eBay\
            \ API documentation</a>"
        promotionalShippingRule:
          description: "This container defines the promotional combined-shipping rule\
            \ that offers discounts or free shipping based on order value, item count,\
            \ or other qualifying conditions."
          $ref: "#/components/schemas/PromotionalShippingRuleType"
      description: "This type represents the request schema for creating promotional\
        \ shipping rules with combined payment durations."
    DispatchCutoffTimePreferencesType:
      type: "object"
      properties:
        cutoffTime:
          type: "string"
          description: "This field indicates the dispatch cut-off time in Zulu format\
            \ (<code>HH:mm:ss.SSSZ</code>) - 24-hour format with milliseconds and\
            \ Z timezone indicator. </br> <b>Note</b>: Despite the Z that is returned\
            \ in the timestamp, the cut-off time is actually based on the default\
            \ timezone of the eBay marketplace for the seller. </br> <b>Note</b>:\
            \ If an eBay listing supports same-day shipping, and an order is paid\
            \ for before the cut-off time, the seller is expected to ship the order\
            \ out that same business day."
      description: "This container is used to change the order cut-off time for same-day\
        \ shipping."
    EndOfAuctionEmailPreferencesType:
      type: "object"
      properties:
        emailCustomized:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller is\
            \ using a customized email to send to winning bidders."
        logoCustomized:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller is\
            \ using a customized logo in the emails that are sent to winning bidders."
        logoType:
          type: "string"
          description: "This enum indicates the type of logo that is used in the email\
            \ that is sent to winning bidders. See EndOfAuctionLogoTypeEnum type for\
            \ descriptions of the different logo types. For implementation help, refer\
            \ to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:EndOfAuctionLogoTypeEnum'>eBay\
            \ API documentation</a>"
        logoUrl:
          type: "string"
          description: "This field shows the URL path to a seller’s custom logo image\
            \ that is being used in the email sent to winning bidders. This field\
            \ is only returned if the seller is using a customized logo in emails."
        templateText:
          type: "string"
          description: "This field shows the body text that is being used if the seller\
            \ is sending customized emails to winning bidders. The template text has\
            \ a maximum limit  of 1000 characters."
        textCustomized:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller is\
            \ using customized text in the emails that are sent to winning bidders."
      description: "This container shows the seller's preferences for the end-of-auction\
        \ email sent to the winning bidder."
    Error:
      type: "object"
      properties:
        category:
          type: "string"
          description: "Identifies the type of erro."
        domain:
          type: "string"
          description: "Name for the primary system where the error occurred. This\
            \ is relevant for application errors."
        errorId:
          type: "integer"
          description: "A unique number to identify the error."
          format: "int32"
        inputRefIds:
          type: "array"
          description: "An array of request elements most closely associated to the\
            \ error."
          items:
            type: "string"
        longMessage:
          type: "string"
          description: "A more detailed explanation of the error."
        message:
          type: "string"
          description: "Information on how to correct the problem, in the end user's\
            \ terms and language where applicable."
        outputRefIds:
          type: "array"
          description: "An array of request elements most closely associated to the\
            \ error."
          items:
            type: "string"
        parameters:
          type: "array"
          description: "An array of name/value pairs that describe details the error\
            \ condition. These are useful when multiple errors are returned."
          items:
            $ref: "#/components/schemas/ErrorParameter"
        subdomain:
          type: "string"
          description: "Further helps indicate which subsystem the error is coming\
            \ from. System subcategories include: Initialization, Serialization, Security,\
            \ Monitoring, Rate Limiting, etc."
      description: "This type defines the fields that can be returned in an error."
    ErrorParameter:
      type: "object"
      properties:
        name:
          type: "string"
          description: "The object of the error."
        value:
          type: "string"
          description: "The value of the object."
    FlatShippingRuleType:
      type: "object"
      properties:
        combinedShippingRules:
          type: "array"
          description: "This array specifies the type of combined-shipping rule applied,\
            \ such as flat-rate or cost-based."
          items:
            $ref: "#/components/schemas/CombinedShippingRule"
        combinedShippingRuleType:
          type: "string"
          description: "This container defines the type of discount rule applied (e.g.,\
            \ percentage-based, fixed-rate). For implementation help, refer to <a\
            \ href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedShippingRuleTypeEnum'>eBay\
            \ API documentation</a>"
      description: "This type defines the flat-rate combined-shipping rule, which\
        \ applies a fixed shipping cost for multiple items shipped together."
    GetCombinedShippingRulesPublicApiResponse:
      type: "object"
      properties:
        calculatedHandlingRule:
          description: "This container will show one or more calculated shipping rules\
            \ set up for that seller on that ebay marketplace.<br><br><span class=\"\
            tablenote\"><b>Note:</b> This will not be returned if a calculated handling\
            \ rule is not set up for that seller on that eBay marketplace"
          $ref: "#/components/schemas/CalculatedHandlingRuleType"
        calculatedShippingRule:
          description: "This container specifies the type of combined-shipping rule\
            \ applied, such as flat-rate, weight-based, or cost-based."
          $ref: "#/components/schemas/CalculatedShippingRuleType"
        combinedDuration:
          type: "string"
          description: "This field is represented by one of the values in the CombinedPaymentPeriodEnum\
            \ type. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentPeriodEnum'>eBay\
            \ API documentation</a>"
        flatShippingRule:
          description: "This container will show one or more flat shipping rules set\
            \ up for that seller on that ebay marketplace."
          $ref: "#/components/schemas/FlatShippingRuleType"
        promotionalShippingRule:
          description: "This container shows the promotional shipping rule that is\
            \ currently set up on the seller's account for the eBay marketplace. <br><br>This\
            \ container will not be returned if no promotional shipping rule is currently\
            \ set up on the seller's account for the eBay marketplace."
          $ref: "#/components/schemas/PromotionalShippingRuleType"
      description: "The base response type of the getCombinedShippingRules method.\
        \ <br><br>All of a seller's calculated, flat, and promotional shipping discount\
        \ rules defined for an eBay marketplace will be returned in the response,\
        \ along with the current combined duration value."
    GetItemsAwaitingPaymentPreferencesType:
      type: "object"
      properties:
        autoRelist:
          type: "boolean"
          description: "This boolean indicates if the item should be automatically\
            \ relisted."
        delayBeforeCancellingCommitment:
          type: "integer"
          description: "This integer indicates the delay in days before cancelling\
            \ the buyer&#x27;s commitment."
          format: "int32"
        excludedUsers:
          type: "array"
          description: "This string returns the list of sellers excluded from unpaid\
            \ item assistance."
          items:
            type: "string"
        optInStatus:
          type: "boolean"
          description: "This boolean indicates if the unpaid item assistance is opted\
            \ in."
      description: "This container represents the seller's preferences for the list\
        \ of items that are awaiting payment."
    GetUserPreferencesResponse:
      type: "object"
      properties:
        combinedPaymentPreferences:
          description: "This container returns the combined payment preferences when\
            \ the <code>COMBINED_PAYMENT</code> value is included through the <b>fieldgroups</b>\
            \ query parameter or when <b>fieldgroups</b>=<code>ALL</code>. It indicates\
            \ if the seller allows multiple line items from the same buyer to be combined."
          $ref: "#/components/schemas/CombinedPaymentPreferencesType"
        dispatchCutoffTimePreference:
          description: "This container is returned when the <code>DISPATCH_CUTOFF_TIME</code>\
            \ value is included through the <b>fieldgroups</b> query parameter or\
            \ when <b>fieldgroups</b>=<code>ALL</code>."
          $ref: "#/components/schemas/DispatchCutoffTimePreferencesType"
        emailShipmentTrackingNumberPreference:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller’s account\
            \ is configured to automatically send an email to buyers with the shipment\
            \ tracking number for an order."
        endOfAuctionEmailPreferences:
          description: "This container allows sellers to customize the email sent\
            \ to buyers immediately after an auction listing is won."
          $ref: "#/components/schemas/EndOfAuctionEmailPreferencesType"
        globalShippingProgramListingPreference:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller’s new\
            \ listings on the eBay marketplace will automatically use the Global Shipping\
            \ Program for international shipping. This field is returned when the\
            \ <code>GLOBAL_SHIPPING_PROGRAM</code> value is included through the <b>fieldgroups</b>\
            \ query parameter or when <b>fieldgroups</b>=<code>ALL</code>. </br> <b>Note</b>:\
            \ The Global Shipping Program is only available for the eBay UK marketplace,\
            \ and the seller must be opted into the program."
        itemsAwaitingPaymentPreferences:
          description: "This container shows the seller’s preferences for automatically\
            \ handling unpaid line items."
          $ref: "#/components/schemas/GetItemsAwaitingPaymentPreferencesType"
        offerGlobalShippingProgramPreference:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller is\
            \ opted into the Global Shipping Program on the eBay marketplace. </br><b>Note</b>:\
            \ The Global Shipping Program is only available for the eBay UK marketplace."
        outOfStockControlPreference:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller is\
            \ opted into the Out-of-Stock feature. With this feature, a multiple quantity\
            \ fixed price listing that runs out of stock will be hidden from eBay\
            \ search but kept alive. Once the sellers add quantity to the listing,\
            \ the listing will become active and available again."
        overrideGspServiceWithIntlServicePreference:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller specifies\
            \ an international shipping service to a particular country for a given\
            \ listing, the specified service will take precedence and be the listing's\
            \ default international shipping option for buyers in that country, rather\
            \ than the Global Shipping Program. </br><b>Note</b>: The Global Shipping\
            \ Program is only available for the eBay UK marketplace."
        pickupDropoffSellerPreference:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller is\
            \ opted into the Click & Collect feature. </br><b>Note</b>: The Click\
            \ & Collect feature is only available on the eBay UK, Australia, and Germany\
            \ marketplaces."
        purchaseReminderEmailPreferences:
          type: "boolean"
          description: "This boolean field indicates whether or not the seller’s account\
            \ is configured to have eBay send occasional purchase reminder emails\
            \ for unpaid line items."
        requiredShipPhoneNumberPreference:
          type: "boolean"
          description: "This boolean field indicates whether or not the buyer is required\
            \ to provide a shipping phone number during checkout."
        sellerExcludeShipToLocationPreferences:
          description: "This container shows the list of locations that the seller\
            \ does not ship to. This list of shipping locations can only be updated\
            \ in My eBay through Shipping Preferences and not with the <code>setUserPreferences</code>\
            \ method."
          $ref: "#/components/schemas/SellerExcludeShipToLocationPreferencesType"
        sellerProfilePreferences:
          description: "This container is returned when the <code>SELLER_PROFILE</code>\
            \ value is included through the <b>fieldgroups</b> query parameter or\
            \ when <b>fieldgroups</b>=<code>ALL</code>."
          $ref: "#/components/schemas/SellerProfilePreferencesType"
        shippingCarrierRatePreferences:
          description: "This container indicates the FedEx, UPS, and US Post Office\
            \ shipping rate types that are available to the seller. This container\
            \ is returned when the <code>SHIPPING_CARRIER_RATE</code> value is included\
            \ through the <b>fieldgroups</b> query parameter or when <b>fieldgroups</b>=<code>ALL</code>.\
            \ </br><b>Note</b>: This container is only applicable to the eBay US marketplace."
          $ref: "#/components/schemas/ShippingCarrierRatePreferencesType"
      description: "This type defines the responses for the getUserPreferences method."
    MeasureType:
      type: "object"
      properties:
        unit:
          type: "string"
          description: "This field defines the unit of measure (e.g., kilograms, pounds)\
            \ associated with the value field. For implementation help, refer to <a\
            \ href='https://developer.ebay.com/api-docs/sell/account/types/api:WeightUnitOfMeasureEnum'>eBay\
            \ API documentation</a>"
        value:
          type: "string"
          description: "This field defines the numeric value representing the measurement,\
            \ weight, in the specified unit."
      description: "This type displays measurement type with value, unit, and measurement\
        \ system."
    PayoutInstrument:
      type: "object"
      properties:
        accountLastFourDigits:
          type: "string"
          description: "The last four digits of the account that the seller uses to\
            \ receive payouts. This may be the last four digits of a bank account\
            \ or a payment processor account such as Payoneer."
        instrumentId:
          type: "string"
          description: "The unique reference identifier for a payout instrument. The\
            \ <b>instrumentId</b> is needed to change the split-payout percentages\
            \ through an <b>updatePayoutPercentage</b> request."
        instrumentStatus:
          type: "string"
          description: "The status of a payout instrument. Valid payout instrument\
            \ statuses include:<br/><ul><li><code>PENDING:</code> This status indicates\
            \ that the account must be verified before it can be used.</li><li><code>ACTIVE:</code>This\
            \ status indicates that payouts are enabled on this account.</li><li><code>VERIFICATION_FAILED:</code>\
            \ This status indicates that verification has failed for this account\
            \ and payouts are disabled.</li><li><code>INACTIVE:</code> This status\
            \ indicates that this account has become inactive and payouts are disabled.</li></ul><br/>See\
            \ <b>InstrumentStatusEnum</b> for more details on each instrument status\
            \ value.<br><br><span class=\"tablenote\"><b>Note:</b> Payment accounts\
            \ can only receive payouts if the status of a payout instrument is <code>ACTIVE</code>.</span>\
            \ For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/sel:InstrumentStatusEnum'>eBay\
            \ API documentation</a>"
        instrumentType:
          type: "string"
          description: "The type of account that received payouts. The value returned\
            \ in this field may be:<br/><ul><li><code>BANK</code>: Indicates that\
            \ the payout was made to a seller's bank account.</li><li><code>CARD</code>\
            \ (<b>Not Currently Available</b>): Indicates that the payout went to\
            \ a seller's debit card.</li><li>The name of a digital wallet provider\
            \ or payment processor (e.g., <code>PAYONEER</code>)</li></ul><br><span\
            \ class=\"tablenote\"><b>Note:</b> Only Payoneer is currently supported\
            \ for sellers in mainland China. Card payouts are not currently available\
            \ for sellers in mainland China.</span> "
        nickname:
          type: "string"
          description: "When <b>instrumentType</b> returns <code>BANK</code>, this\
            \ value is the seller-provided nickname that the seller uses to represent\
            \ the bank account that receives the payout.<br/><br/>When <b>instrumentType</b>\
            \ returns <code>CARD</code>, this value is the debit card network for\
            \ the debit card that receives the payout.<br/><br/>When <b>instrumentType</b>\
            \ returns a provider of digital wallet or payment processing services,\
            \ the value returned is the name of the service provider (e.g., <code>PAYONEER</code>)<br><br><span\
            \ class=\"tablenote\"><b>Note:</b> Only Payoneer is currently supported\
            \ for sellers in mainland China. Card payouts are not currently available\
            \ for sellers in mainland China.</span>"
        payoutPercentage:
          type: "string"
          description: "The current payout percentage allocated to an instrument.\
            \ For example, <code>50</code> indicates that 50% of the payout goes to\
            \ the instrument."
      description: "This type is used to provide details about one or two of the seller's\
        \ accounts that are enabled to receive payouts."
    PayoutSettingsResponse:
      type: "object"
      properties:
        payoutInstruments:
          type: "array"
          description: "This array provides details about the seller's accounts defined\
            \ for the seller's account.<br><br> Payment accounts can only receive\
            \ payouts if the status of the payout instrument is <code>ACTIVE</code>."
          items:
            $ref: "#/components/schemas/PayoutInstrument"
      description: "The base response type of the <b>getPayoutSettings</b> method."
    PromotionalShippingRuleType:
      type: "object"
      properties:
        combinedShippingRuleType:
          type: "string"
          description: "This field specifies the type of combined-shipping rule applied,\
            \ such as flat-rate or cost-based, <br><br>as defined in the CombinedShippingRuleTypeEnum.\
            \ For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedShippingRuleTypeEnum'>eBay\
            \ API documentation</a>"
        itemCount:
          type: "integer"
          description: "This integer indicates the quantity of items that must be\
            \ purchased by the buyer in order for that buyer to qualify for the promotional\
            \ discount."
          format: "int32"
        orderAmount:
          description: "This container specifies the minimum order amount required\
            \ to qualify for the associated discount or promotional rule."
          $ref: "#/components/schemas/Amount"
        shippingCost:
          description: "This container represents the total shipping cost or discounted\
            \ shipping charge for the combined order."
          $ref: "#/components/schemas/Amount"
      description: "This type is used to represent a promotional shipping rule set\
        \ up by the seller on an eBay marketplace."
    Rate:
      type: "object"
      properties:
        additionalCost:
          description: "An additional shipping cost added to the base shipping rate\
            \ (i.e., <b>shippingCost</b>).<br/><br/>This amount applies only to the\
            \ following <b>rateTableBasis</b> options:<ul><li><b>WEIGHT</b>: This\
            \ is a cost per unit weight and is calculated using the weight of the\
            \ item(s) being shipped.</li><li><b>SURCHARGE</b>: This is a flat amount\
            \ that is added to the base shipping rate.</li></ul>This field is returned\
            \ only when it is applicable to the specified rate ID."
          $ref: "#/components/schemas/Amount"
        rateId:
          type: "string"
          description: "The unique identifier for rate information.<br/><br/><span\
            \ class=\"tablenote\"><strong>Note:</strong> This is a string that is\
            \ automatically assigned by the system when a rate object is created.</span>"
        shippingCategory:
          type: "string"
          description: "Indicates the level of shipping service to which the shipping\
            \ rate information applies.<br/><br/>Available shipping categories are:<ul><li><b>ONE_DAY</b>:\
            \ <i>This option is not supported when <b>shippingOptionType</b> is INTERNATIONAL.</i>\
            \ </li><li><b>EXPEDITED</b></li><li><b>STANDARD</b></li><li><b>ECONOMY</b></li><li><b>EXPRESS</b>:\
            \ <i>This option is supported only when <b>MarketplaceId</b> is <code>EBAY_DE</code>\
            \ (Germany)</i></li></ul> For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:ShippingCategoryEnum'>eBay\
            \ API documentation</a>"
        shippingCost:
          description: "Specifies the base shipping rate for an item.<br/><br/>This\
            \ amount applies only to the following <b>rateTableBasis</b> options:<ul><li><b>ITEM</b>:\
            \ This is a flat rate shipping cost per item being shipped.</li><li><b>WEIGHT</b>:\
            \ This is a cost per unit weight and is calculated using the weight of\
            \ the item(s) being shipped.</li></ul>"
          $ref: "#/components/schemas/Amount"
        shippingRegionNames:
          type: "array"
          description: "An array of Region names to which the shipping rate information\
            \ applies.<br/><br/>Returned values may be:<ul><li>Geographical Regions\
            \ (e.g., <code>Worldwide</code>, <code>Europe</code>, and <code>Middle\
            \ East</code>)</li><li>Individual countries identified by a two-letter\
            \ code such as <code>US</code> (United States), <code>CA</code> (Canada),\
            \ and <code>GB</code> (United Kingdom)</li><li>US states and/or Canadian\
            \ provinces identified by a two-letter code such as <code>NY</code> (New\
            \ York) or <code>SK</code> (Saskatchewan)</li><li>Domestic Regions such\
            \ as <code>AK/HI</code> (Alaska/Hawaii)</li></ul>"
          items:
            type: "string"
        shippingServiceCode:
          type: "string"
          description: "An enum value that indicates the shipping service used for\
            \ the specified shipping rate. These enum values align with <b>ShippingService</b>\
            \ metadata returned by a <b>GeteBayDetails</b> call with <b>DetailName</b>\
            \ set to <code>shippingServiceDetails</code>."
      description: "This container details shipping rate information identified by\
        \ a unique rate ID. A successful call returns the requested shipping rate\
        \ information."
    RateTableDetails:
      type: "object"
      properties:
        marketplaceId:
          type: "string"
          description: "Identifies the eBay marketplace to which the shipping rate\
            \ table applies. For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/ba:MarketplaceIdEnum'>eBay\
            \ API documentation</a>"
        name:
          type: "string"
          description: "The seller-defined name for the shipping rate table. Names\
            \ must be unique for each table assigned to the same seller, shippingOptionType,\
            \ and eBay marketplace.<br/><br/><b>Max length:</b> 50"
        rates:
          type: "array"
          description: "An array of rate objects associated with the specified shipping\
            \ rate table. Each rate object is identified by a unique system-generated\
            \ ID and defines specific shipping rate information."
          items:
            $ref: "#/components/schemas/Rate"
        rateTableBasis:
          type: "string"
          description: "The rate calculation type provides three methods of calculating\
            \ the shipping cost based on the seller's selection/input:<ul><li><b>ITEM</b>:\
            \ Specifies the flat rate shipping cost that buyers in the specified shipping\
            \ region will pay. When this option is selected, information specified\
            \ in the rate table overrides all shipping options/costs that are specified\
            \ at the listing level. Buyers in the specified regions will only see\
            \ the services provided in the rate table. Buyers in other regions that\
            \ are not specified in the rate table will see the shipping services associated\
            \ with the listing.</li><li><b>WEIGHT</b>: Seller can provide minimum\
            \ shipping cost and an additional shipping cost per pound. The additional\
            \ cost will be calculated based on the weight the seller provide at the\
            \ time of listing. Buyers will see the total shipping cost and won’t see\
            \ these calculations.  Buyers in the specified regions will only see the\
            \ services provided in the rate table. Buyers in other regions that were\
            \ not specified in the rate table, will see the shipping services associated\
            \ with the listing.</li><li><b>SURCHARGE</b>: Lists surcharges for buyers\
            \ within specified regions, or indicates a flat amount added to the shipping\
            \ cost specified within an item's listing. Buyers will see only the total\
            \ shipping cost as well as shipping services associated with the item's\
            \ listing. If a SURCHARGE is specified in the rate table for certain regions,\
            \ buyers in those regions will see the (shipping cost + SURCHARGE) total.</li></ul>\
            \ For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:ShippingRateCalculationEnum'>eBay\
            \ API documentation</a>"
        rateTableId:
          type: "string"
          description: "A unique, system-generated ID assigned to the shipping rate\
            \ table when it is initially created."
        shippingOptionType:
          type: "string"
          description: "The region serviced by the shipping rate table. Valid values\
            \ are:<ul><li><b>DOMESTIC</b>: Indicates that the shipping rate table\
            \ applies to shipping destinations within the country in which an item\
            \ has been listed (i.e., the <i>source</i> country).</li><li><b>INTERNATIONAL</b>:\
            \ Indicates that the shipping rate table applies to shipping destinations\
            \ outside of the country in which an item has been listed.</li></ul> For\
            \ implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:ShippingOptionTypeEnum'>eBay\
            \ API documentation</a>"
      description: "This container includes all information pertaining to a shipping\
        \ rate table. A successful call returns the requested shipping rate information."
    RateTableUpdate:
      type: "object"
      properties:
        rates:
          type: "array"
          description: "An array of rate objects for which <b>shippingCost</b> and/or\
            \ <b>additionalCost</b> are to be updated."
          items:
            $ref: "#/components/schemas/RateUpdate"
      description: "This type is used by the request payload of the <b>updateShippingCost</b>\
        \ method to pass updated shipping cost information for a rate table identified\
        \ by <b>rateTableId</b>."
    RateUpdate:
      type: "object"
      properties:
        additionalCost:
          description: "An additional shipping cost added to the base shipping rate\
            \ (i.e., <b>shippingCost</b>).<br/><br/>This amount applies only to the\
            \ following <b>rateTableBasis</b> options:<ul><li><b>WEIGHT</b>: This\
            \ is a cost per unit weight and is calculated using the weight of the\
            \ item(s) being shipped.</li><li><b>SURCHARGE</b>: This is a flat amount\
            \ that is added to the base shipping rate.</li></ul>This field is returned\
            \ only when it is applicable to the specified rate ID."
          $ref: "#/components/schemas/Amount"
        rateId:
          type: "string"
          description: "The identifier for the rate object.<br/><br/><span class=\"\
            tablenote\"><strong>Note:</strong> This is a string automatically assigned\
            \ by the system when the rate object is created. It cannot be changed\
            \ or updated.</span>"
        shippingCost:
          description: "This is the base shipping rate for an item.<br/><br/>This\
            \ amount applies only to the following <b>rateTableBasis</b> options:<ul><li><b>ITEM</b>:\
            \ This is a flat rate shipping cost per item being shipped.</li><li><b>WEIGHT</b>:\
            \ This is a cost per unit weight and is calculated using the weight of\
            \ the item(s) being shipped.</li></ul>"
          $ref: "#/components/schemas/Amount"
      description: "This container defines the updated shipping cost information for\
        \ a rate object identified by <b>rateId</b>.<br/><br/>To view a list of all\
        \ rate objects and corresponding <b>rateID</b> values, issue <b>getRateTable</b>\
        \ for the rate table identified by <b>rateTableId</b>."
    SellerExcludeShipToLocationPreferencesType:
      type: "object"
      properties:
        excludeShipToLocations:
          type: "array"
          description: "This array shows the list of locations that the seller does\
            \ not ship to. Excluded locations may include continents and large geographical\
            \ areas. For example, 'Middle East', individual countries represented\
            \ by two-letter codes, or special locations within a country such as 'Alaska/Hawaii'\
            \ or 'PO Box'."
          items:
            type: "string"
      description: "This container represents the list of locations that the seller\
        \ wants to exclude from shipping."
    SellerProfilePreferencesType:
      type: "object"
      properties:
        sellerProfileOptedIn:
          type: "boolean"
          description: "This boolean indicates whether the seller has opted in to\
            \ seller profiles."
      description: "This container indicates whether or not the seller is opted into\
        \ Business Policies. If a seller is opted into Business Policies, they must\
        \ use Payment,Return, and Shipping business policies instead of individual\
        \ payment, return, and shipping fields."
    ShippingCarrierRatePreferencesType:
      type: "object"
      properties:
        fedexRateOption:
          type: "string"
          description: "This enum is included if the seller wishes to add or modify\
            \ the FedEx shipping carrier rate. </br><b>Note</b>: This preference is\
            \ only applicable to the eBay US marketplace. For implementation help,\
            \ refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:FedexRateOptionEnum'>eBay\
            \ API documentation</a>"
        upsRateOption:
          type: "string"
          description: "This enum is included if the seller wishes to add or modify\
            \ the UPS shipping carrier rate. </br><b>Note</b>: This preference is\
            \ only applicable to the eBay US marketplace. For implementation help,\
            \ refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:UPSRateOptionEnum'>eBay\
            \ API documentation</a>"
      description: "This field is included if the seller wishes to add or modify the\
        \ shipping carrier rate type that is available to the seller. This field is\
        \ only returned if set. </br><b>Note</b>: This container is only applicable\
        \ to the eBay US marketplace."
    UpdateCalculatedShippingRulesRequest:
      type: "object"
      properties:
        calculatedHandlingRule:
          description: "This container specifies the calculated handling rule that\
            \ determines how handling fees are automatically computed based on order\
            \ weight, quantity, or value in a combined shipment."
          $ref: "#/components/schemas/CalculatedHandlingRuleType"
        calculatedShippingRule:
          description: "This container defines the calculated shipping rule that determines\
            \ shipping costs or discounts based on factors such as total weight, price,\
            \ or item count in a combined order."
          $ref: "#/components/schemas/CalculatedShippingRuleType"
        combinedDuration:
          type: "string"
          description: "This container specifies the duration within which multiple\
            \ unpaid orders may be combined into a single invoice, represented by\
            \ one of the values in the CombinedPaymentPeriodEnum type. For implementation\
            \ help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentPeriodEnum'>eBay\
            \ API documentation</a>"
      description: "This type is used to update calculated shipping rules."
    UpdateCombinedPaymentsRequest:
      type: "object"
      properties:
        combinedDuration:
          type: "string"
          description: "This field specifies the duration within which multiple unpaid\
            \ orders may be combined into a single invoice. <br><br>One of the values\
            \ in the CombinedPaymentPeriodEnum type must be used in this field. For\
            \ implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentPeriodEnum'>eBay\
            \ API documentation</a>"
      description: "This type is used to update the combined payment duration"
    UpdateFlatShippingRulesRequest:
      type: "object"
      properties:
        combinedDuration:
          type: "string"
          description: "This field specifies the duration within which multiple unpaid\
            \ orders may be combined into a single invoice. <br><br> One of the values\
            \ in the CombinedPaymentPeriodEnum type must be used in this field. For\
            \ implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentPeriodEnum'>eBay\
            \ API documentation</a>"
        flatShippingRule:
          description: "This container defines the flat-rate combined-shipping rule,\
            \ which applies a fixed shipping cost for multiple items shipped together."
          $ref: "#/components/schemas/FlatShippingRuleType"
      description: "This type defines a request to update flat shipping rules."
    UpdatePayoutPercentage:
      type: "object"
      properties:
        instrumentId:
          type: "string"
          description: "The unique reference identifier for a payout instrument. This\
            \ value is returned in the <a href=\"/api-docs/sell/account/v2/resources/payout_settings/methods/getPayoutSettings\"\
            \ target=\"_blank \">getPayoutSettings</a> response and is needed to change\
            \ split-payout percentages through an <b>updatePayoutPercentage</b> request."
        payoutPercentage:
          type: "string"
          description: "The user-defined payout percentage allocated to this instrument.\
            \ For example, <code>50</code> indicates that 50% of the payout goes to\
            \ this instrument.<br/><br/>The split-payout percentage <b>must</b> be\
            \ a positive integer value from 0-100. The values of two instruments <b>must</b>\
            \ always add up to 100%. If the values do not equal 100, the call will\
            \ fail."
      description: "This type allows the user to change the payout percentages for\
        \ two active payment instruments."
    UpdatePayoutPercentageRequest:
      type: "object"
      properties:
        payoutInstruments:
          type: "array"
          description: "This array allows the seller to set the payout split percentages\
            \ for two accounts enabled to receive payouts."
          items:
            $ref: "#/components/schemas/UpdatePayoutPercentage"
      description: "This type is used by the request payload of the <b>updatePayoutPercentage</b>\
        \ method to allow a seller to configure the split-payout percentages for two\
        \ payout instruments."
    UpdatePromotionalShippingRuleRequest:
      type: "object"
      properties:
        combinedDuration:
          type: "string"
          description: "This container specifies the duration within which multiple\
            \ unpaid orders may be combined into a single invoice.<br><br>One of the\
            \ values in the CombinedPaymentPeriodEnum type must be used in this field.\
            \ For implementation help, refer to <a href='https://developer.ebay.com/api-docs/sell/account/types/api:CombinedPaymentPeriodEnum'>eBay\
            \ API documentation</a>"
        promotionalShippingRule:
          description: "This container specifies the promotional shipping rule that\
            \ offers discounts or free-shipping options based on defined order thresholds,\
            \ item counts, or marketplace conditions."
          $ref: "#/components/schemas/PromotionalShippingRuleType"
      description: "This type defines a request to update promotional shipping rule."
  securitySchemes:
    api_auth:
      type: "oauth2"
      description: "The security definitions for this API. Please check individual\
        \ operations for applicable scopes."
      flows:
        authorizationCode:
          authorizationUrl: "https://auth.ebay.com/oauth2/authorize"
          tokenUrl: "https://api.ebay.com/identity/v1/oauth2/token"
          scopes:
            https://api.ebay.com/oauth/api_scope/sell.finances: "View and manage your\
              \ payment and order information to display this information to you and\
              \ allow you to initiate refunds using the third party application"
            https://api.ebay.com/oauth/api_scope/sell.account.readonly: "View your\
              \ account settings"
            https://api.ebay.com/oauth/api_scope/sell.account: "View and manage your\
              \ account settings"
