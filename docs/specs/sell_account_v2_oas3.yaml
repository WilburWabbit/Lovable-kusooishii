---
openapi: "3.0.0"
info:
  title: "Account v2 API"
  description: "This API allows sellers to retrieve and manage their custom shipping\
    \ rate tables. In addition, this API also provides sellers in mainland China methods\
    \ to configure split-payouts between two separate payment instruments."
  contact:
    name: "eBay Inc,"
  license:
    name: "eBay API License Agreement"
    url: "https://developer.ebay.com/join/api-license-agreement"
  version: "2.2.0"
servers:
- url: "https://api.ebay.com{basePath}"
  description: "Production"
  variables:
    basePath:
      default: "/sell/account/v2"
paths:
  /rate_table/{rate_table_id}:
    get:
      tags:
      - "rate_table"
      description: "This method retrieves an existing rate table identified by the\
        \ <b>rate_table_id</b> path parameter.<br><br>Shipping rate tables are currently\
        \ supported by the following marketplaces: United States, Canada, United Kingdom,\
        \ Germany, Australia, France, Italy, and Spain. A successful call returns\
        \ detailed information for the specified shipping rate table."
      operationId: "getRateTable"
      parameters:
      - name: "rate_table_id"
        in: "path"
        description: "This path parameter is the unique identifier for the shipping\
          \ rate table to retrieve.<br/><br/> Use the <a href=\"/api-docs/sell/account/resources/rate_table/methods/getRateTables\"\
          \ target=\"_blank\">getRateTables</a> method of the <a href=\"/api-docs/sell/account/static/overview.html\
          \ \" target=\"_blank\">Account API v1</a> to retrieve rate table IDs."
        required: true
        schema:
          type: "string"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateTableDetails"
        "400":
          description: "Bad Request"
          x-response-codes:
            errors:
              394001:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified rate table ID is invalid. Please input\
                  \ a valid rate table ID. The getRateTables method can be used to\
                  \ retrieve valid rate table IDs"
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              395000:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was a problem with an eBay internal system or\
                  \ process. Contact eBay developer support for assistance."
        "404":
          description: "Not found"
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.account"
        - "https://api.ebay.com/oauth/api_scope/sell.account.readonly"
  /rate_table/{rate_table_id}/update_shipping_cost:
    post:
      tags:
      - "rate_table"
      description: "This method allows sellers to update <b>shippingCost</b> and/or\
        \ <b>additionalCost</b> information for an existing shipping rate table identified\
        \ by the <b>rate_table_id</b> path parameter.<br><br>A successful call returns\
        \ an HTTP status code of <b>204 No Content</b>."
      operationId: "updateShippingCost"
      parameters:
      - name: "rate_table_id"
        in: "path"
        description: "This path parameter is the unique identifier for the shipping\
          \ rate table for which shipping costs will be updated.<br/><br/> Use the\
          \ <a href=\"/api-docs/sell/account/resources/rate_table/methods/getRateTables\"\
          \ target=\"_blank\">getRateTables</a> method of the <a href=\"/api-docs/sell/account/static/overview.html\
          \ \" target=\"_blank\">Account API v1</a> to retrieve rate table IDs."
        required: true
        schema:
          type: "string"
      - name: "Content-Type"
        in: "header"
        description: "This header indicates the format of the request body provided\
          \ by the client. It's value should be set to <b>application/json</b>. <br><br>\
          \ For more information, refer to <a href=\"/api-docs/static/rest-request-components.html#HTTP\"\
          \ target=\"_blank \">HTTP request headers</a>."
        required: true
        schema:
          type: "string"
      requestBody:
        description: "Request to update the shipping costs for the identified shipping\
          \ rate table."
        content:
          application/json:
            schema:
              description: "Request to update the shipping costs for the identified\
                \ shipping rate table."
              $ref: "#/components/schemas/RateTableUpdate"
        required: false
      responses:
        "400":
          description: "Bad Request"
          x-response-codes:
            errors:
              394026:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The additional cost value is invalid."
              394025:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The shipping cost value is invalid."
              394007:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Please specify the rateId value for one or more shipping\
                  \ rate entries being updated."
              394004:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Please specify at least one shipping rate entry to add/update\
                  \ through the rates array."
              394036:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Additional costs are not applicable for shipping rate\
                  \ tables based on shipping item. Please remove the additional cost\
                  \ container."
              394035:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The shipping cost is not supported in surcharge calculation\
                  \ type."
              394001:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified rate table ID is invalid. Please input\
                  \ a valid rate table ID. The getRateTables method can be used to\
                  \ retrieve valid rate table IDs"
              394015:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The number of rate entries must be less than or equal\
                  \ to the existing data."
              394012:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified additional cost currency does not match\
                  \ the currency used for the marketplace."
              394011:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The additional cost containers are missing for one or\
                  \ more shipping rate entries for the WEIGHT/SURCHARGE rate table.\
                  \ Please provide these values for the additional rate entries being\
                  \ added/updated."
              394008:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The shippingCost containers are missing for one or more\
                  \ shipping rate entries. Please provide the shipping cost values\
                  \ for the shipping rate entries being updated."
              394009:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified shipping cost currency does not match\
                  \ the currency used for the marketplace."
              394041:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The rateId of rates is repeated."
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              395000:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was a problem with an eBay internal system or\
                  \ process. Contact eBay developer support for assistance."
        "204":
          description: "No Content"
        "404":
          description: "Not Found"
        "409":
          description: "Conflict"
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.account"
  /payout_settings:
    get:
      tags:
      - "payout_settings"
      description: "<div class=\"msgbox_important\"><p class=\"msgbox_importantInDiv\"\
        \ data-mc-autonum=\"&lt;b&gt;&lt;span style=&quot;color: #dd1e31;&quot; class=&quot;mcFormatColor&quot;&gt;Important!\
        \ &lt;/span&gt;&lt;/b&gt;\"><span class=\"autonumber\"><span><b><span style=\"\
        color: #dd1e31;\" class=\"mcFormatColor\">Important!</span></b></span></span>\
        \ Split-payout functionality is <b>only</b> available to mainland China sellers,\
        \ who can split payouts between their Payoneer account and bank account. Card\
        \ payouts are not currently available for sellers in mainland China.</p></div><br/>This\
        \ method returns details on two payment instruments defined on a seller's\
        \ account, including the ID, type, status, nickname, last four digits of the\
        \ account number, and payout percentage for the instruments.<br/><br/>Using\
        \ the <b>instrumentId</b> returned with this method, sellers can makes changes\
        \ to the payout split of the instruments with the <b>updatePayoutPercentage</b>\
        \ method. Note that the <b>instrumentStatus</b> of a payment instrument, also\
        \ returned using this method, must be <code>ACTIVE</code> in order to do split\
        \ payouts on that payment instrument."
      operationId: "getPayoutSettings"
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutSettingsResponse"
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              395000:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was a problem with an eBay internal system or\
                  \ process. Contact eBay developer support for assistance."
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.finances"
  /payout_settings/update_percentage:
    post:
      tags:
      - "payout_settings"
      description: "<div class=\"msgbox_important\"><p class=\"msgbox_importantInDiv\"\
        \ data-mc-autonum=\"&lt;b&gt;&lt;span style=&quot;color: #dd1e31;&quot; class=&quot;mcFormatColor&quot;&gt;Important!\
        \ &lt;/span&gt;&lt;/b&gt;\"><span class=\"autonumber\"><span><b><span style=\"\
        color: #dd1e31;\" class=\"mcFormatColor\">Important!</span></b></span></span>\
        \  Split-payout functionality is <b>only</b> available to mainland China sellers,\
        \ who can split payouts between their Payoneer account and bank account. Card\
        \ payouts are not currently available for sellers in mainland China.</p></div><br/>This\
        \ method allows sellers in mainland China to configure the split-payout percentage\
        \ for two payout instruments available for seller payouts. For example, a\
        \ seller can split payouts to have 70% of the payout go to a bank account\
        \ and 30% go to a Payoneer account.<br><br><span class=\"tablenote\"><b>Note:</b>\
        \ The split-payout percentage <b>must</b> always add up to 100%. If the values\
        \ do not equal 100, the call will fail. Instruments cannot be added/removed\
        \ using Finance and Account APIs. </span><br/>Users can specify the payout\
        \ instruments being updated by using the <b>instrumentId</b> associated with\
        \ each payment instrument in the request payload. This value is returned by\
        \ using the <b>getPayoutSettings</b> method. Users can specify the percentage\
        \ of the payout allocated to each instrument using the <b>payoutPercentage</b>\
        \ request field. This value must be a whole number and cannot exceed 100.<br><br>\
        \ For more details on configuring split-payout percentages, see <a href=\"\
        /api-docs/split-payout/playbook.html\" target=\"_blank \">Mainland China Split\
        \ Payout Playbook.</a> "
      operationId: "updatePayoutPercentage"
      parameters:
      - name: "Content-Type"
        in: "header"
        description: "This header indicates the format of the request body provided\
          \ by the client. Its value should be set to <b>application/json</b>. <br><br>\
          \ For more information, refer to <a href=\"/api-docs/static/rest-request-components.html#HTTP\"\
          \ target=\"_blank \">HTTP request headers</a>."
        required: true
        schema:
          type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePayoutPercentageRequest"
        required: false
      responses:
        "400":
          description: "Bad Request"
          x-response-codes:
            errors:
              394102:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Missing payoutPercentage in request."
              394103:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The 'payoutPercentage' {payoutPercentage} is not valid.\
                  \ The payout percentage should be an integer value. Minimum value:\
                  \ {0}, Maximum value: {100}."
              394100:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The seller is not eligible to set split-payout percentage."
              394101:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Missing instrumentId in request."
              394106:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Instrument 'instrumentId' {instrumentId} not found."
              394107:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Instrument 'instrumentId' {instrumentId} missing in\
                  \ request."
              394104:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Duplicate instrumentId in request."
              394105:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Sum up of 'payoutPercentage' in request must be equal\
                  \ to 100, current value {payoutPercentage}."
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              395100:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was an internal error, please try again after\
                  \ sometime."
              395000:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was a problem with an eBay internal system or\
                  \ process. Contact eBay developer support for assistance."
        "204":
          description: "No Content"
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.finances"
  /combined_shipping_rules/create_calculated_shipping_rules:
    post:
      tags:
      - "combined_shipping_rules"
      description: "This method creates or registers calculated shipping rules that\
        \ determine combined shipping costs based on weight, item count, or cost parameters\
        \ for an authenticated seller. <br><br> This shipping rule will apply to eBay\
        \ listings that use the calculated shipping model."
      operationId: "createCalculatedShippingRules"
      parameters:
      - name: "X-EBAY-C-MARKETPLACE-ID"
        in: "header"
        description: "This field header specifies the eBay marketplace identifier\
          \ for which the API request is being executed. This header ensures that\
          \ the shipping rule applies to the correct regional eBay site (e.g., EBAY_US,\
          \ EBAY_GB, EBAY_DE). <br><br> For the full list of eBay marketplace values,\
          \ see the https://developer.ebay.com/api-docs/sell/account/v2/types/ba:MarketplaceIdEnum\
          \ type."
        required: true
        schema:
          type: "string"
      requestBody:
        description: "This type is used to define and configure calculated combined\
          \ shipping and handling rules and/or change the combined payment duration."
        content:
          application/json:
            schema:
              description: "This type is used to define and configure calculated combined\
                \ shipping and handling rules and/or change the combined payment duration."
              $ref: "#/components/schemas/CreateCalculatedShippingRulesRequest"
        required: false
      responses:
        "400":
          description: "Bad Request"
          x-response-codes:
            errors:
              396006:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'eachAdditionalAmount'."
              396007:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedDuration'."
              396004:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedShippingRules' data. Please\
                  \ verify all required fields are provided with valid values."
              396005:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedShippingRuleName'."
              396002:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedShippingRuleType'."
              396003:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Combined shipping rule names must be unique. Rule names\
                  \ cannot match existing rules in the system or be duplicated within\
                  \ the request."
              396000:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'currency'."
              396012:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedShippingRuleType' in 'calculatedHandlingRule'."
              396013:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing amount data in 'calculatedHandlingRule'."
              396010:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "For create operation, 'combinedShippingRuleId' is not\
                  \ allowed."
              396008:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'eachAdditionalAmountOffShippingCost'."
              396009:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'eachAdditionalPercentOffShippingCost'."
              396023:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified marketplace ID was not found."
              396021:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'weightOffTotalWeight'."
              396019:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'eachAdditionalPercentOffShippingCost'."
              396025:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Missing 'calculatedShippingRule'."
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              395000:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was a problem with an eBay internal system or\
                  \ process. Contact eBay developer support for assistance."
        "204":
          description: "No Content"
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.account"
  /combined_shipping_rules/create_flat_shipping_rules:
    post:
      tags:
      - "combined_shipping_rules"
      description: "This method is used to create fixed-rate (flat) shipping rules\
        \ that apply standard combined shipping costs for a seller’s listings."
      operationId: "createFlatShippingRules"
      parameters:
      - name: "X-EBAY-C-MARKETPLACE-ID"
        in: "header"
        description: "This field specifies the eBay marketplace identifier where the\
          \ operation will be executed. <br><br> This header ensures that the promotional\
          \ shipping rule is applied to the correct regional marketplace (for example,\
          \ EBAY_US, EBAY_GB, EBAY_DE)."
        required: true
        schema:
          type: "string"
      requestBody:
        description: "This type is used to define and configure flat-rate combined\
          \ shipping rules and/or change the combined payment duration."
        content:
          application/json:
            schema:
              description: "This type is used to define and configure flat-rate combined\
                \ shipping rules and/or change the combined payment duration."
              $ref: "#/components/schemas/CreateFlatShippingRulesRequest"
        required: false
      responses:
        "400":
          description: "Bad Request"
          x-response-codes:
            errors:
              396006:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'eachAdditionalAmount'."
              396007:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedDuration'."
              396023:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified marketplace ID was not found."
              396004:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedShippingRules' data. Please\
                  \ verify all required fields are provided with valid values."
              396005:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedShippingRuleName'."
              396002:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedShippingRuleType'."
              396003:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Combined shipping rule names must be unique. Rule names\
                  \ cannot match existing rules in the system or be duplicated within\
                  \ the request."
              396000:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'currency'."
              396010:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "For create operation, 'combinedShippingRuleId' is not\
                  \ allowed."
              396008:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'eachAdditionalAmountOffShippingCost'."
              396024:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Missing 'flatShippingRule'."
              396009:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'eachAdditionalPercentOffShippingCost'."
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              395000:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was a problem with an eBay internal system or\
                  \ process. Contact eBay developer support for assistance."
        "204":
          description: "No Content"
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.account"
  /combined_shipping_rules/create_promotional_shipping_rule:
    post:
      tags:
      - "combined_shipping_rules"
      description: "This method defines promotional shipping rules such as discounts\
        \ or free-shipping thresholds, configurable by marketplace for the seller."
      operationId: "createPromotionalShippingRule"
      parameters:
      - name: "X-EBAY-C-MARKETPLACE-ID"
        in: "header"
        description: "This field header specifies the eBay marketplace identifier\
          \ for this request, ensuring the operation targets the correct regional\
          \ site (e.g., EBAY_US, EBAY_GB, EBAY_DE).<br><br> For the full list of eBay\
          \ marketplace values, see the https://developer.ebay.com/api-docs/sell/account/v2/types/ba:MarketplaceIdEnum\
          \ type."
        required: true
        schema:
          type: "string"
      requestBody:
        description: "This type is used to define and configure the promotional combined\
          \ shipping rule and/or change the combined payment duration."
        content:
          application/json:
            schema:
              description: "This type is used to define and configure the promotional\
                \ combined shipping rule and/or change the combined payment duration."
              $ref: "#/components/schemas/CreatePromotionalShippingRuleRequest"
        required: false
      responses:
        "400":
          description: "Bad Request"
          x-response-codes:
            errors:
              396007:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedDuration'."
              396023:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified marketplace ID was not found."
              396020:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'itemCount'."
              396002:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'combinedShippingRuleType'."
              396018:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'orderAmount'."
              396000:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'currency'."
              396001:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Missing 'promotionalShippingRule'."
              396017:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "Invalid or missing 'shippingCost'."
              396014:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified combined shipping rule data does not match\
                  \ any existing rules or the operation is not supported for this\
                  \ rule type."
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              395000:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was a problem with an eBay internal system or\
                  \ process. Contact eBay developer support for assistance."
        "204":
          description: "No Content"
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.account"
  /combined_shipping_rules:
    get:
      tags:
      - "combined_shipping_rules"
      description: "This method retrieves all existing combined shipping rule configurations\
        \ defined by the authenticated seller, including calculated, flat, and promotional\
        \ types."
      operationId: "getCombinedShippingRules"
      parameters:
      - name: "X-EBAY-C-MARKETPLACE-ID"
        in: "header"
        description: "This field header specifies the eBay marketplace identifier\
          \ for this request, ensuring the operation targets the correct regional\
          \ site <br><br>(e.g., EBAY_US, EBAY_GB, EBAY_DE). <br><br> For the full\
          \ list of eBay marketplace values, see the https://developer.ebay.com/api-docs/sell/account/v2/types/ba:MarketplaceIdEnum\
          \ type."
        required: true
        schema:
          type: "string"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCombinedShippingRulesPublicApiResponse"
        "400":
          description: "Bad Request"
          x-response-codes:
            errors:
              396023:
                domain: "API_ACCOUNT"
                category: "REQUEST"
                description: "The specified marketplace ID was not found."
        "500":
          description: "Internal Server Error"
          x-response-codes:
            errors:
              395000:
                domain: "API_ACCOUNT"
                category: "APPLICATION"
                description: "There was a problem with an eBay internal system or\
                  \ process. Contact eBay developer support for assistance."
      security:
      - api_auth:
        - "https://api.ebay.com/oauth/api_scope/sell.account.readonly"
  /combined_shipping_rules/update_calculated_shipping_rules:
    post:
