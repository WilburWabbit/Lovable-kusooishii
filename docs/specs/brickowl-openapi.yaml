openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Brick Owl API
  version: v1-unofficial
  summary: Unofficial OpenAPI translation of the public Brick Owl API documentation.
  description: |
    This OpenAPI document is an unofficial, best-effort transcription of the public Brick Owl API documentation.

    Notes:
    - GET requests send the API key (`key`) and other parameters in the query string.
    - POST requests send the API key (`key`) and other parameters as `application/x-www-form-urlencoded`.
    - The public docs describe endpoints and request arguments, but they do not publish complete response schemas. Response bodies in this document are therefore modelled permissively.
    - The public docs state a rate limit of 600 requests per minute for most requests, or 100 requests per minute for bulk/batch requests.
    - The public docs also mention storefront form helpers for add-to-cart and add-to-wishlist. Those are not under `https://api.brickowl.com/v1` and are intentionally not included here.
servers:
- url: https://api.brickowl.com/v1
  description: Brick Owl API v1
externalDocs:
  description: Official Brick Owl API documentation
  url: https://www.brickowl.com/api_docs
tags:
- name: Affiliate
  description: Affiliate partner endpoints.
- name: Bulk
  description: Batch multiple API requests together.
- name: Catalog
  description: Catalog lookup and search endpoints. Brick Owl notes that catalog API access requires contacting them.
- name: Catalog Edit
  description: Submit change requests for catalog data.
- name: Collection
  description: Manage the authenticated user's collection.
- name: Store Inventory
  description: List and manage store inventory lots.
- name: Invoice
  description: Retrieve invoice transaction information.
- name: Order
  description: List, inspect, and update orders.
- name: Token
  description: Deprecated token metadata endpoints.
- name: User
  description: Information about the user account linked to the API key.
- name: Wishlist
  description: Manage wishlists and wishlist lots.
components:
  schemas:
    ApiKey:
      type: string
      description: Brick Owl API key.
    Boid:
      type: string
      description: Brick Owl item identifier (BOID).
    CountryCode:
      type: string
      pattern: ^[A-Z]{2}$
      description: ISO 3166-1 alpha-2 country code.
    ItemType:
      type: string
      enum:
      - Part
      - Set
      - Minifigure
      - Gear
      - Sticker
      - Minibuild
      - Instructions
      - Packaging
      description: Brick Owl item type.
    ConditionId:
      type: string
      enum:
      - new
      - news
      - newc
      - newi
      - usedc
      - usedi
      - usedn
      - usedg
      - useda
      - other
      description: Brick Owl lot condition identifier.
    FieldOptionType:
      type: string
      enum:
      - category_0
      - eye_color
      - eyebrow_color
      - facial_expression
      - facial_hair_color
      - facial_hair_type
      - gender
      - material_type
      - packaging_type
      - remove_image
      - sides_printed
      - sticker_sheet_color
      - theme_0
      - type
      description: Catalog field type whose options should be listed.
    LanguageCode:
      type: string
      enum:
      - en
      - fr
      - de
      - es
      - da
      - nl
      - it
      - bg
      - zh-hans
      - cs
      - fi
      - ja
      - ko
      - nb
      - pl
      - sv
      - uk
      description: Language code for localised field option responses.
    CatalogEditSubmissionType:
      type: string
      enum:
      - base_name
      - basic_decoration_description
      - category_0
      - cleaned_lego_name
      - delete
      - delete_scheduled
      - description
      - eye_color
      - eyebrow_color
      - facial_expression
      - facial_hair_color
      - facial_hair_type
      - first_available
      - gender
      - height
      - our_asin
      - our_bl_item_no
      - our_set_number
      - our_design_id
      - our_ean
      - our_isbn
      - our_ldraw
      - our_cs_set_number
      - our_item_no
      - our_obsolete_design_id
      - our_official_set_number
      - our_other
      - our_peeron_id
      - our_rebrickable_id
      - our_upc
      - instructions_booklets
      - instructions_pages
      - length
      - material_type
      - packaging_type
      - remove_image
      - ship_height
      - ship_length
      - ship_width
      - sides_printed
      - sticker_sheet_color
      - stud_height
      - stud_length
      - stud_width
      - theme_0
      - type
      - variant_child_assembly_mask
      - variant_child_decoration_mask
      - variant_desc
      - weight
      - width
      description: Catalog edit submission type.
    InvoiceIdType:
      type: string
      enum:
      - public_invoice_id
      - stripe_charge_id
      description: Type of invoice identifier supplied.
    OrderListType:
      type: string
      enum:
      - store
      - customer
      description: Whether to list store orders or orders you have placed.
    OrderSortBy:
      type: string
      enum:
      - created
      - updated
      description: Order list sort key.
    OrderStatusId:
      type: integer
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      description: Order status ID accepted by the set-status endpoint.
    OrderStatusFilter:
      description: Order status filter. Brick Owl accepts either the formatted status name or the numeric ID.
      oneOf:
      - type: integer
        enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
      - type: string
        enum:
        - Pending
        - Payment Submitted
        - Payment Received
        - Processing
        - Processed
        - Shipped
        - Received
        - On Hold
        - Cancelled
    FeedbackRating:
      type: integer
      enum:
      - 1
      - 0
      - -1
      description: 'Feedback rating: 1 positive, 0 neutral, -1 negative.'
    ZeroOrOne:
      type: integer
      enum:
      - 0
      - 1
      description: Integer flag accepted by Brick Owl.
    BlankablePositiveNumber:
      description: Either a positive number or an empty string.
      anyOf:
      - type: number
        exclusiveMinimum: 0
      - type: string
        maxLength: 0
    UndocumentedJson:
      description: Arbitrary JSON value. The public Brick Owl docs do not publish a complete response schema for this operation.
      anyOf:
      - type: object
        additionalProperties: true
      - type: array
        items: {}
      - type: string
      - type: number
      - type: boolean
      - type: 'null'
    CatalogCartItemsJson:
      type: string
      description: JSON-serialised cart items payload, e.g. {"items":[{"design_id":"3034","color_id":21,"qty":"1"}]}.
    BulkRequestsJson:
      type: string
      description: JSON-serialised batch payload. See the example for the exact Brick Owl format.
    TierPriceString:
      type: string
      description: Tier pricing string in the format 'tier1quantity:tier1price,tier2quantity:tier2price,...' or 'remove' to clear it.
  parameters:
    ApiKeyQuery:
      name: key
      in: query
      required: true
      description: Brick Owl API key. The public docs require GET requests to send the key in the query string.
      schema:
        $ref: '#/components/schemas/ApiKey'
  responses:
    UndocumentedSuccess:
      description: Success. The public Brick Owl docs do not publish a complete response schema for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UndocumentedJson'
    UndocumentedError:
      description: Error response. Shape not documented in the public Brick Owl docs.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UndocumentedJson'
paths:
  /affiliate/stores:
    get:
      tags:
      - Affiliate
      summary: List affiliate stores
      description: Get a list of all the stores that have opted in to your affiliate scheme.
      operationId: getAffiliateStores
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /affiliate/lots:
    get:
      tags:
      - Affiliate
      summary: List affiliate store lots
      description: Retrieve the lots for a store that has opted in to your affiliate scheme.
      operationId: getAffiliateLots
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: store_id
        in: query
        required: true
        schema:
          type: integer
        description: The store's unique ID.
      - name: type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ItemType'
        description: Optional item type filter.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /bulk/batch:
    post:
      tags:
      - Bulk
      summary: Batch requests
      description: Batch up to 50 requests into one bulk request to reduce request overhead.
      operationId: postBulkBatch
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  $ref: '#/components/schemas/ApiKey'
                requests:
                  $ref: '#/components/schemas/BulkRequestsJson'
              required:
              - key
              - requests
            examples:
              catalogSearchBatch:
                summary: Batch two catalog search requests
                value:
                  key: YOUR_API_KEY
                  requests: '{"requests":[{"endpoint":"catalog/search","request_method":"GET","params":[{"query":"Vendor"}]},{"endpoint":"catalog/search","request_method":"GET","params":[{"query":"Laser"}]}]}'
              inventoryUpdateBatch:
                summary: Batch one inventory update request
                value:
                  key: YOUR_API_KEY
                  requests: '{"requests":[{"endpoint":"inventory/update","request_method":"POST","params":[{"lot_id":"IDHERE","absolute_quantity":2}]}]}'
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/list:
    get:
      tags:
      - Catalog
      summary: List catalog items
      description: Get a list of all items in the Brick Owl catalog. Brick Owl notes that access to the catalog API requires contacting them.
      operationId: getCatalogList
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ItemType'
        description: Optional item type filter.
      - name: brand
        in: query
        required: false
        schema:
          type: string
        description: Optional brand filter.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/lookup:
    get:
      tags:
      - Catalog
      summary: Lookup catalog item by BOID
      description: Retrieve details about a catalog item by BOID.
      operationId: getCatalogLookup
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: boid
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/Boid'
        description: A BOID.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/availability:
    get:
      tags:
      - Catalog
      summary: Get item availability
      description: Retrieve pricing and availability information for a catalog item by BOID. Brick Owl notes that this is limited to 400 results.
      operationId: getCatalogAvailability
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: boid
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/Boid'
        description: A BOID.
      - name: quantity
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
        description: Optional minimum required quantity.
      - name: country
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/CountryCode'
        description: ISO2 shipping destination country code.
      - name: store_country
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/CountryCode'
        description: Optional ISO2 store country filter.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/id_lookup:
    get:
      tags:
      - Catalog
      summary: Lookup BOIDs by external ID
      description: Retrieve possible BOIDs for another identifier such as a set number or design ID.
      operationId: getCatalogIdLookup
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: id
        in: query
        required: true
        schema:
          type: string
        description: Identifier to look up.
      - name: type
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/ItemType'
        description: Item type filter.
      - name: id_type
        in: query
        required: false
        schema:
          type: string
        description: Optional ID type filter, for example item_no, design_id, bl_item_no, or set_number.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/bulk:
    get:
      tags:
      - Catalog
      summary: Get catalog bulk metadata
      description: Retrieve bulk catalog dumps. Brick Owl notes that this endpoint should only be used when instructed to do so.
      operationId: getCatalogBulk
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: type
        in: query
        required: true
        schema:
          type: string
        description: Bulk type.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/bulk_lookup:
    get:
      tags:
      - Catalog
      summary: Bulk lookup catalog items
      description: Retrieve details about multiple catalog items at once.
      operationId: getCatalogBulkLookup
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: boids
        in: query
        required: true
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Boid'
          maxItems: 100
        description: Comma-separated list of BOIDs. Maximum 100 values.
        style: form
        explode: false
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/search:
    get:
      tags:
      - Catalog
      summary: Search catalog
      description: Search, browse, and filter the catalog. Use the query term 'All' to browse.
      operationId: getCatalogSearch
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: query
        in: query
        required: true
        schema:
          type: string
        description: Search term. Use 'All' to browse.
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
        description: Optional page number.
      - name: missing_data
        in: query
        required: false
        schema:
          type: string
        description: Optional missing-data filter value. Brick Owl says valid values can be discovered from the catalog search UI.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/inventory:
    get:
      tags:
      - Catalog
      summary: Get item inventory
      description: Retrieve an item's inventory.
      operationId: getCatalogInventory
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: boid
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/Boid'
        description: A BOID.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/condition_list:
    get:
      tags:
      - Catalog
      summary: List lot conditions
      description: Retrieve the list of conditions that a lot can have.
      operationId: getCatalogConditionList
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/field_option_list:
    get:
      tags:
      - Catalog
      summary: List field options
      description: Retrieve the possible option values for a catalog field.
      operationId: getCatalogFieldOptionList
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: type
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/FieldOptionType'
        description: Field type.
      - name: language
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/LanguageCode'
        description: Optional response language.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/cart_basic:
    post:
      tags:
      - Catalog
      summary: Create a basic catalog cart
      description: Create a catalog cart from design IDs and LEGO colour IDs, and return pricing in the destination country's currency. The returned cart ID can be used with `/catalog_cart_load/ID` on the Brick Owl website.
      operationId: postCatalogCartBasic
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  $ref: '#/components/schemas/ApiKey'
                items:
                  $ref: '#/components/schemas/CatalogCartItemsJson'
                condition:
                  $ref: '#/components/schemas/ConditionId'
                country:
                  $ref: '#/components/schemas/CountryCode'
              required:
              - key
              - items
              - condition
              - country
            examples:
              basicCart:
                summary: Two design IDs in one cart
                value:
                  key: YOUR_API_KEY
                  items: '{"items":[{"design_id":"3034","color_id":21,"qty":"1"},{"design_id":"3004","color_id":23,"qty":"2"}]}'
                  condition: new
                  country: GB
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog/color_list:
    get:
      tags:
      - Catalog
      summary: List colours
      description: Retrieve the list of Brick Owl colours.
      operationId: getCatalogColorList
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /catalog_edit/basic_edit:
    post:
      tags:
      - Catalog Edit
      summary: Submit a basic catalog edit
      description: Submit a change request for a catalog item. Brick Owl notes that some fields are item-specific or user-specific and that all fields return appropriate error information.
      operationId: postCatalogEditBasic
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  $ref: '#/components/schemas/ApiKey'
                boid:
                  $ref: '#/components/schemas/Boid'
                type:
                  $ref: '#/components/schemas/CatalogEditSubmissionType'
                value:
                  type: string
                  description: Submission value. The actual form-encoded value depends on the selected submission type and may represent a string, number, option, or binary choice.
              required:
              - key
              - boid
              - type
              - value
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /collection/lots:
    get:
      tags:
      - Collection
      summary: List collection lots
      description: Get a list of collection lots with details.
      operationId: getCollectionLots
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /collection/update:
    post:
      tags:
      - Collection
      summary: Update a collection lot
      description: Update a collection lot. Brick Owl requires at least one update field.
      operationId: postCollectionUpdate
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  $ref: '#/components/schemas/ApiKey'
                lot_id:
                  type: integer
                  description: Collection lot ID.
                quantity:
                  type: integer
                  minimum: 1
                  description: Quantity, greater than 0.
                price:
                  $ref: '#/components/schemas/BlankablePositiveNumber'
                note:
                  type: string
                  description: Lot note.
                condition:
                  $ref: '#/components/schemas/ConditionId'
              required:
              - key
              - lot_id
              anyOf:
              - required:
                - quantity
              - required:
                - price
              - required:
                - note
              - required:
                - condition
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /collection/delete_lot:
    post:
      tags:
      - Collection
      summary: Delete a collection lot
      description: Delete a collection lot.
      operationId: postCollectionDeleteLot
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  $ref: '#/components/schemas/ApiKey'
                lot_id:
                  type: integer
                  description: Collection lot ID.
              required:
              - key
              - lot_id
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /collection/create_lot:
    post:
      tags:
      - Collection
      summary: Create a collection lot
      description: Create a new collection lot. You must pass an item identifier. Parts require a colour, Gear can optionally include a colour, and other item types must not include one.
      operationId: postCollectionCreateLot
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  $ref: '#/components/schemas/ApiKey'
                boid:
                  $ref: '#/components/schemas/Boid'
                color_id:
                  type: integer
                  description: Brick Owl colour ID. Required for Parts, optional for Gear, and not allowed for other item types.
              required:
              - key
              - boid
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /inventory/list:
    get:
      tags:
      - Store Inventory
      summary: List inventory lots
      description: Get a list of store inventory lots with details.
      operationId: getInventoryList
      parameters:
      - $ref: '#/components/parameters/ApiKeyQuery'
      - name: type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ItemType'
        description: Optional item type filter.
      - name: active_only
        in: query
        required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/ZeroOrOne'
          default: 1
        description: Include only items that are for sale and have quantity > 0. Default 1.
      - name: external_id_1
        in: query
        required: false
        schema:
          type: string
        description: Optional external lot identifier to return one lot.
      - name: lot_id
        in: query
        required: false
        schema:
          type: integer
        description: Optional Brick Owl lot ID to return one lot.
      responses:
        '200':
          $ref: '#/components/responses/UndocumentedSuccess'
        default:
          $ref: '#/components/responses/UndocumentedError'
  /inventory/update:
    post:
      tags:
      - Store Inventory
      summary: Update an inventory lot
      description: Update a lot's data. Brick Owl requires exactly one identifier (`external_id` or `lot_id`) and at least one update field.
      operationId: postInventoryUpdate
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  $ref: '#/components/schemas/ApiKey'
                external_id:
                  type: string
                  description: External lot identifier.
                lot_id:
                  type: integer
                  description: Brick Owl lot ID.
                absolute_quantity:
                  type: integer
                  minimum: 0
                  description: Absolute new quantity.
                relative_quantity:
                  type: integer
                  description: Positive or negative amount to adjust the existing quantity by.
                for_sale:
                  $ref: '#/components/schemas/ZeroOrOne'
                price:
                  type: number
                  exclusiveMinimum: 0
                  description: Positive price, rounded by Brick Owl to 3 digits of precision.
                sale_percent:
                  type: integer
