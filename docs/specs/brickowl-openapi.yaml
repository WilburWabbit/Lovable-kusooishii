webhooks:
  /brick_owl_order_notify:
    get:
      summary: Brick Owl order notification callback
      description: When enabled via `POST /order/notify`, Brick Owl sends an HTTP GET request to `http://{ip}:42500/brick_owl_order_notify` with query parameters `order_id` and `store_id`. Brick Owl notes that this service is not guaranteed, so consumers should also poll order endpoints.
      operationId: brickOwlOrderNotify
      parameters:
      - name: order_id
        in: query
        required: true
        description: Order ID.
        schema:
          type: integer
      - name: store_id
        in: query
        required: true
        description: Store ID.
        schema:
          type: integer
      responses:
        '200':
          description: Notification accepted.
        default:
          description: Any other receiver-specific response.
